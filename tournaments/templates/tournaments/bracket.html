{% extends 'tournaments/base.html' %}
{% block content %}

<section>
	{% if players %}
	<table>
		<thead>
			<tr>
				<th>Player 1</th>
				<th>P1 Rating</th>
				<th>P1 Score</th>
				<th></th>
				<th>P2 Score</th>
				<th>P2 Rating</th>
				<th>Player 2</th>
			</tr>
		</thead>
		<tbody {% for player in players %} <tr>
			<th scope="row"> {{player.name}}</th>
			<td> {{player.rating}}</td>
			<td> {{player.score}}</td>
			<td></td>
			</tr>
			{% endfor %}
			{% else %}
			<p>Empty</p>
		</tbody>
	</table>
	{% endif %}
	<a  class="button btn-form" href="{% url 'tournaments:add_players' id=bracket.id %}">Add</a>
</section>

{% endblock content %}
