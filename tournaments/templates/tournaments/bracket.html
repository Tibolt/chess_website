{% extends 'tournaments/base.html' %}
{% block content %}

<section>
	{% if players %}
	<table>
		<thead>
			<tr>
				<th>Name</th>
				<th>Last Name</th>
				<th>Age</th>
				<th>Rating</th>
				<th>Score</th>
			</tr>
		</thead>
		<tbody>
			{% for player in players %} <tr>
				<td scope="row"> {{player.name}}</td>
				<td> {{player.last_name}}</td>
				<td> {{player.age}}</td>
				<td> {{player.rating}}</td>
				<td> {{player.score}}</td>
			</tr>
			{% endfor %}
			{% else %}
			<p>Empty</p>
		</tbody>
		{% endif %}
	</table>
	<div class="inline-container">
		<a class="button btn-form" href="{% url 'tournaments:add_players' id=bracket.id %}">Add</a>
		<a class="button btn-form" href="{% url 'tournaments:edit_players' id=bracket.id %}">Edit</a>
	</div>
</section>

{% endblock content %}
